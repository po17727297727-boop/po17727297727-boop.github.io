    <h1>无线通信</h1>

<footer class="footer"><div class="container"><p>© 2026 陈沛哲 — 嵌入式软件开发工程师</p></div></footer>

<script src="assets/js/main.js"></script>
<script>
  const modal = new Modal(); initLightbox();
  const projectData = {
    proj9:{title:"基于 BLE 协议栈与 Find My 网络的低功耗智能定位系统",desc:"基于蓝牙 BLE 协议栈进行二次开发，深度兼容苹果 Find My 定位协议。通过设备端发送加密广播包、苹果生态设备网络协同感知、云端服务器解密中转以及微信小程序前端交互，实现无需 GPS 模块的全球盲区追踪。",tags:["BLE协议栈","Find My","微信小程序","低功耗"],images:["assets/images/image 8.png","assets/images/50d1991495520fcaa28776654e4e07e0.png"],duties:["BLE 协议栈二次开发：实现私有 MAC 地址的配置与加密 RawData 数据广播，设计可变广播间隔策略。","前端应用开发：设计设备绑定功能，通过输入/扫描唯一设备码建立微信用户与定位器硬件的绑定关系。调用API获取服务器解密的位置数据，利用微信原生 map 组件渲染。"]},
    proj12:{title:"基于stm32的蓝牙平衡小车",desc:"基于 STM32 控制器与 HC_05 蓝牙模块构建的双轮平衡小车，通过姿态控制算法与 PID 电机控制算法实现稳定平衡与移动，支持手机 APP 蓝牙远程操控。",tags:["PID控制","卡尔曼滤波","HC-05","MPU6050"],images:["assets/images/image 12.png"],duties:["运动姿态自平衡解算：利用 MPU6050，编写互补滤波/卡尔曼滤波算法融合加速度与角速度数据，实现高精度、低延迟的车体倾角与角速度解算。","控制算法设计：设计并调试直立环、速度环、转向环的串级 PID 控制算法，实现小车在静态及动态干扰下的快速自平衡稳定。"]}
  };
  function dutySummary(d){const i=d.indexOf("：");return i>0?d.substring(0,i):d.split(":")[0];}
  const container=document.getElementById("projectsContainer"),ids=["proj9","proj12"];
  ids.forEach(id=>{
    const d=projectData[id],n=d.images.length;
    let imgs;
    if(n===1) imgs=`<img src="${d.images[0]}" alt="${d.title}" loading="lazy">`;
    else imgs=d.images.map(s=>`<img src="${s}" alt="${d.title}" loading="lazy">`).join("");
    const tags=d.tags.map(t=>`<span class="tag">${t}</span>`).join(" ");
    const duties=d.duties.map((duty,i)=>`<li><strong>${i+1}.</strong> ${duty}</li>`).join("");
    const card=document.createElement("div");card.className="proj-detail reveal";
    card.innerHTML=`<h2>${d.title}</h2><div class="proj-split"><div class="proj-left img-${n}">${imgs}</div><div class="proj-right"><div class="meta-block"><h4>项目描述</h4><p>${d.desc}</p></div><div class="meta-block"><h4>技术栈</h4><div class="tags-row">${tags}</div></div><div class="meta-block"><h4>⚙️ 项目职责</h4><ol class="duties-list">${duties}</ol></div></div></div>`;
    container.appendChild(card);
  });
  document.querySelectorAll(".proj-left img").forEach(img=>{img.addEventListener("click",function(){const s=this.getAttribute("src");let f;for(const id of ids){if(projectData[id].images.includes(s)){f=projectData[id];break;}}if(!f)return;const d=f;modal.open(`<h2>${d.title}</h2><p class="desc">${d.desc}</p><div class="modal-gallery">${d.images.map(s=>`<img src="${s}" alt="">`).join("")}</div><div style="margin:12px 0;">${d.tags.map(t=>`<span class="tag">${t}</span>`).join(" ")}</div><h3>⚙️ 项目职责</h3><div class="modal-duties">${d.duties.map((duty,i)=>`<div><strong>${i+1}.</strong> ${duty}</div>`).join("")}</div>`);});});
</script>
