    .proj-detail { margin-bottom: 60px; padding-bottom: 48px; border-bottom: 1px solid var(--border); }
    .proj-detail:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

    .img-3 { display: flex; gap: 10px; }

    .img-3 .img-stack { flex: 1 1 45%; display: flex; flex-direction: column; gap: 8px; }
    .img-3 .img-stack img { max-height: 216px; flex: 1; }
    .img-4 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .proj-right .duties-list { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 5px; }
    .proj-right .duties-list li { font-size: 14px; color: var(--text-secondary); padding: 12px 18px; background: var(--bg); border: 1px solid var(--border-light); border-radius: 8px; line-height: 1.7; transition: box-shadow var(--transition); }

  <div class="container">
    <h1>视觉图像处理与边缘AI</h1>

<script src="assets/js/main.js"></script>
<script>
  const modal = new Modal(); initLightbox();
  const projectData = {
    proj7:{title:"基于YOLOV5与STM32的激光追踪云台系统",desc:"采用RK3588+ STM32 的双级异构方案。通过深度学习与经典图像处理算法相结合，实现多目标实时提取与姿态估计；控制端基于精密步进电机云台，实现高动态响应、高跟踪精度的闭环控制系统。",tags:["YOLOv5","INT8量化","卡尔曼滤波","逆透视变换"],images:["assets/images/image61.png","assets/images/image62.png"],duties:["高性能边缘端深度学习部署：对 YOLOv5 模型进行轻量化剪枝与 INT8 动态量化，实现 70fps+ 红绿激光光斑实时检测。优化曝光度与非极大值抑制策略。","复杂几何特征提取与逆透视映射：灰度二值化、形态学开闭运算及 Canny 算子提取边界，多边形拟合定位靶纸关键顶点，构建逆透视变换矩阵消除梯形畸变。","多时滞状态估计与卡尔曼滤波预测：构建恒定速度模型卡尔曼滤波器，时域向前预测位置偏差，实现无滞后、零拖尾的动态追踪效果。"]},
    proj11:{title:"基于STM32H7的嵌入式边缘计算纽扣缺陷检测与自动分拣系统",desc:"以 STM32H7 高性能微控制器为核心硬件平台，通过集成轻量化深度学习模型，实现对传送带高速流水线上纽扣缺陷的实时像素级捕捉与智能识别。",tags:["STM32CubeAI","INT8量化","DMA驱动","RTOS"],images:["assets/images/image 11.png","assets/images/5ab1902f911ac608351e6508419c0bbd.jpg"],duties:["核心模型轻量化移植与边缘端推理优化：利用 STM32CubeAI / X-CUBE-AI 工具链进行 INT8 定点化量化，保证 91.5% 检测准确率前提下将单帧推理延迟降至 30ms 以内。","高实时性软硬件协同设计与自动化精密分拣：基于 RTOS 实时多任务架构设计。编写 DMA 驱动实现摄像头数据高速无损传输，设计精密时间补偿算法精确计算识别到分拣的时间差。"]},
    proj5:{title:"基于 RT-Thread (NXP Cortex-M7) 的智能视觉搬运机器人",desc:"主导基于 NXP-MIMXRT1064 (ARM Cortex-M7 架构) 与 RT-Thread 操作系统的智能视觉搬运系统开发，打通硬件感知-异构通信-多传感器协同控制的底层全链路。",tags:["RT-Thread","MT9V034","状态机","容错恢复"],images:["assets/images/ee0c69c3-e183-4396-9551-55fc8c8935d2.png","assets/images/d6c4e611b5b53f5b84a8a3f2ed5920a0.jpg"],duties:["外设驱动与通信架构设计：完成 MT9V034 全局快门相机驱动，适配 OpenART 视觉模块并部署轻量级神经网络。","RTOS 多任务协同、状态机设计与容错恢复：构建多线程、信号量与消息队列多任务协同框架。设计分层有限状态机，调度寻迹-识别-抓取-返回全流程。","异常状态监测与在线容错恢复：针对识别错误、通信丢包、传感器突变及机械卡死等，设计自动复位、降级运行等补救策略。"]}
  };
  function dutySummary(d){const i=d.indexOf("：");return i>0?d.substring(0,i):d.split(":")[0];}
  const container=document.getElementById("projectsContainer"),ids=["proj5","proj7","proj11"];
  ids.forEach(id=>{
    const d=projectData[id],n=d.images.length;
    let imgs;
    if(n===1) imgs=`<img src="${d.images[0]}" alt="${d.title}" loading="lazy">`;
    else if(n===3){imgs=`<img src="${d.images[0]}" alt="${d.title}" loading="lazy" class="img-main"><div class="img-stack"><img src="${d.images[1]}" alt="${d.title}" loading="lazy"><img src="${d.images[2]}" alt="${d.title}" loading="lazy"></div>`;}
    else imgs=d.images.map(s=>`<img src="${s}" alt="${d.title}" loading="lazy">`).join("");
    const tags=d.tags.map(t=>`<span class="tag">${t}</span>`).join(" ");
    const duties=d.duties.map((duty,i)=>`<li><strong>${i+1}.</strong> ${duty}</li>`).join("");
    const imgCls=(id==="proj5")?"img-2-h":`img-${n}`;
    const card=document.createElement("div");card.className="proj-detail reveal";
    card.innerHTML=`<h2>${d.title}</h2><div class="proj-split"><div class="proj-left ${imgCls}">${imgs}</div><div class="proj-right"><div class="meta-block"><h4>项目描述</h4><p>${d.desc}</p></div><div class="meta-block"><h4>技术栈</h4><div class="tags-row">${tags}</div></div><div class="meta-block"><h4>⚙️ 项目职责</h4><ol class="duties-list">${duties}</ol></div></div></div>`;
    container.appendChild(card);
  });
  document.querySelectorAll(".proj-left img").forEach(img=>{img.addEventListener("click",function(){const s=this.getAttribute("src");let f;for(const id of ids){if(projectData[id].images.includes(s)){f=projectData[id];break;}}if(!f)return;const d=f;modal.open(`<h2>${d.title}</h2><p class="desc">${d.desc}</p><div class="modal-gallery">${d.images.map(s=>`<img src="${s}" alt="">`).join("")}</div><div style="margin:12px 0;">${d.tags.map(t=>`<span class="tag">${t}</span>`).join(" ")}</div><h3>⚙️ 项目职责</h3><div class="modal-duties">${d.duties.map((duty,i)=>`<div><strong>${i+1}.</strong> ${duty}</div>`).join("")}</div>`);});});
</script>
