  <style>
    .proj-detail {
      margin-bottom: 60px;
      padding-bottom: 48px;
      border-bottom: 1px solid var(--border);
    }
    .proj-detail:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

    .proj-detail h2 {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 24px;
      letter-spacing: -0.02em;
      line-height: 1.3;
    }

    /* 50/50 split */
    .proj-split {
      display: flex;
      gap: 40px;
    }

    /* Left: images */
    .proj-left { flex: 0 0 30%;
      min-width: 0;
    }
    .proj-left img {
      width: 100%;
      object-fit: contain;
      background: var(--bg-tertiary);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-light);
      cursor: pointer;
      transition: opacity 0.2s;
      display: block;
    }
    .proj-left img:hover { opacity: 0.85; }

    /* 1 image */
    .img-1 img { max-height: 520px; }

    /* 2 images: stacked */
    .img-2 { display: flex; flex-direction: column; gap: 12px; }
    .img-2 img { max-height: 280px; }

    /* 3 images: left large + right 2 stacked */
    .img-3 { display: flex; gap: 10px; }
    .img-3 .img-main { flex: 1 1 55%; max-height: 440px; align-self: stretch; object-fit: contain; }
    .img-3 .img-stack { flex: 1 1 45%; display: flex; flex-direction: column; gap: 8px; }
    .img-3 .img-stack img { max-height: 216px; flex: 1; }

    /* Right: meta */
    .proj-right { flex: 0 0 70%;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .proj-right .meta-block h4 {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    .proj-right .meta-block p {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.8;
      margin: 0;
    }
    .proj-right .tags-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .proj-right .duties-list {
      list-style: none;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .proj-right .duties-list li {
      font-size: 14px;
      color: var(--text-secondary);
      padding: 12px 18px;
      background: var(--bg);
      border: 1px solid var(--border-light);
      border-radius: 8px;
      line-height: 1.7;
      transition: box-shadow var(--transition);
    }
    .proj-right .duties-list li:hover {
      box-shadow: var(--shadow-sm);
      border-color: var(--border);
    }
    .proj-right .duties-list li strong { color: var(--text); font-weight: 600; }

    @media (max-width: 860px) {
      .proj-split { flex-direction: column; gap: 24px; }
      .proj-left, .proj-right { flex: 1 1 auto; }
      .img-3 { flex-direction: column; }
      .img-3 .img-main, .img-3 .img-stack img { max-height: 360px; }
    }

<script>
  const modal = new Modal();
  initLightbox();

  const projectData = {
    proj1: {

      tags: ["uboot裁剪","内核驱动","事件相机","深度相机","V4L2","ISP Pipeline","QT上位机"],

        "相机驱动开发：基于 V4L2 子设备框架完成 3 款传感器的 Linux 内核驱动开发与适配。实现 V4L2 标准 ops：s_power、s_stream、get/set_fmt、s_ctrl。标定加载IQ 标定文件，调用rkaiq实现 ISP 调优与rgb图像推流进程。",
        "以太网USB驱动及应用开发：配置 USB ConfigFS 复合设备，通过FunctionFS 开辟 3 个 Bulk 端点，利用异步 I/O + POSIX 共享内存实现零拷贝传输。开发 TCP 发送EVS、ToF数据、RTSP流传输RGB视频流以及Web服务器，实现网络配置与进程管理。",
        "Recovery分区的OTA差分升级：设计 eMMC 分区表，通过 misc 分区传递升级命令与状态。构建 Recovery 系统，打包 FIT Image，RSA2048 + SHA256 双重签名验证，QT 客户端读取 .img 文件 → 进入升级模式 → Bulk 传输固件数据 → 触发 Recovery 烧写。",

        "异构传感器融合与高频状态估计：深入定制基于 ROS 的串行通信节点，通过监听 ttyUSB 异步解析底层 MCU 上报的 IMU 原始姿态与轮式里程计数据流。引入扩展卡尔曼滤波（EKF）算法并配置 robot_localization 节点，构建高频时空融合的状态估计器，有效消除轮式打滑与传感器长时漂移，为上层 SLAM 建图与闭环运动规划提供高精度的位姿基准。"
      ]
    },
    proj3: {
      title: "点胶机器人视觉检测与双目对针系统",
      desc: "负责面向点胶机器人的全栈视觉系统研发，覆盖嵌入式 Linux 底层驱动、复杂光学场景下的点胶缺陷检测算法、双目对针标定与实时闭环控制，以及跨平台上位机应用开发。",
      tags: ["全志Cortex-A","SGBM","Qt","PoE相机"],
      images: ["assets/images/image31.png", "assets/images/image32.png"],
      duties: [
        "嵌入式系统裁剪与底层驱动开发：针对全志ARM Cortex-A核心进行Linux系统裁剪与内核优化，使用CMake/Makefile管理交叉编译工程，编写并优化底层相机与运动控制驱动。",

        "复杂动态点胶视觉检测算法：针对胶水透明及背景强反光痛点，设计光电解耦物理成像链路。自主开发时域动态流动分析算法，解决漏胶/断胶的高频误报难题。",
        "双目对针视觉标定与亚像素闭环定位：采用张正友棋盘格标定法完成双目内参估计。SGBM稠密视差图计算，多项式回归将定位精度从整像素提升至0.1像素量级。"
      ]
    },
    proj6: {
      title: "基于RK3588的自行瞄准机器人",
      desc: "采用运动底盘 + 二维精密云台 + 顶配边缘视觉的三位一体架构。实现高速运动状态下对目标靶的动对动高频精准锁定。",
      tags: ["V4L2","Canny边缘检测","逆透视变换","RGA加速"],
      images: ["assets/images/image 5.png","assets/images/d4310c5c09050daf2b3a0432ce075644.png"],
      duties: [
        "图像采集预处理与传输：构建 V4L2 与 RGA 嵌入式视频传输链路，引入硬件加速引擎实现数据零拷贝机制。",
        "图像预处理与目标识别：高斯模糊平滑噪点，反二值化凸显暗色目标，Canny边缘检测提取几何轮廓，闭运算消除断点孔洞，多边形逼近校验几何特征。",
        "逆透视几何校正：对矩形外框角点固定顺序排列，通过预知靶标实际尺寸创建透视变换矩阵，将倾斜靶面展平为正视图。",
        "双轨数据解算与反向映射：利用逆变换矩阵将空间中心反变换回原图，面积倒数根号比模型估计距离，Y方向线性插值补偿。"
      ]
    },
    proj4: {
      title: "基于RK3588的ROS图传移动机器人控制系统",

      tags: ["Flask","MJPEG","ROS","SLAM","EKF","FreeRTOS"],
      images: ["assets/images/a4b52893-1647-473c-b0c4-5d0f072a39e2.png","assets/images/image 4.png"],
      duties: [
        "Web图传与远程交互： 基于 Flask 框架搭建嵌入式轻量化 Web 服务器；设计流式传输机制（Streaming），优化网络带宽与编解码效率，实现低延迟 MJPEG 实时视频流的网页端高效渲染与远程控制交互。",
        "SLAM自主导航与状态估计： 负责在 RK3588 侧部署 Cartographer/Gmapping 算法，集成激光雷达、IMU及编码器数据；应用 robot_localization 框架配置扩展卡尔曼滤波（EKF），实现异构传感器的高精度数据融合，构建了高鲁棒性的二维/三维栅格地图。",
        "底盘多任务协同与实时控制： 基于 STM32 设计 FreeRTOS 多任务实时操作系统，精细调优底盘电机运动控制算法；设计高可靠性自定义帧格式校验协议，利用 UART + DMA（直接内存访问）机制最大化降低通信开销，确保主控与底盘间的数据超低延迟、零丢包交互。"
      ]
    }
  };

  function dutySummary(duty) {
    const idx = duty.indexOf("：");
    return idx > 0 ? duty.substring(0, idx) : duty.split(":")[0];
  }

  const container = document.getElementById("projectsContainer");
  const ids = ["proj1","proj2","proj4","proj3","proj6"];

  ids.forEach(id => {
    const d = projectData[id];
    const n = d.images.length;

    // Build images HTML based on count
    let imagesHTML;
    if (n === 1) {
      imagesHTML = `<img src="${d.images[0]}" alt="${d.title}" loading="lazy">`;
    } else if (n === 3) {
      imagesHTML = `
        <img src="${d.images[0]}" alt="${d.title}" loading="lazy" class="img-main">
        <div class="img-stack">
          <img src="${d.images[1]}" alt="${d.title}" loading="lazy">
          <img src="${d.images[2]}" alt="${d.title}" loading="lazy">
        </div>`;
    } else {
      imagesHTML = d.images.map(src =>
        `<img src="${src}" alt="${d.title}" loading="lazy">`
      ).join("");
    }

    const tagsHTML = d.tags.map(t => `<span class="tag">${t}</span>`).join(" ");
    const dutiesHTML = d.duties.map((duty, i) =>
      `<li><strong>${i+1}.</strong> ${duty}</li>`
    ).join("");

    const card = document.createElement("div");
    card.className = "proj-detail reveal";
    card.innerHTML = `
      <h2>${d.title}</h2>
      <div class="proj-split">
        <div class="proj-left img-${n}">${imagesHTML}</div>
        <div class="proj-right">
          <div class="meta-block">
            <h4>项目描述</h4>
            <p>${d.desc}</p>
          </div>
          <div class="meta-block">
            <h4>技术栈</h4>
            <div class="tags-row">${tagsHTML}</div>
          </div>
          <div class="meta-block">
            <h4>⚙️ 项目职责</h4>
            <ol class="duties-list">${dutiesHTML}</ol>
          </div>
        </div>
      </div>
    `;
    container.appendChild(card);
  });

  // Click image → modal with full details
  document.querySelectorAll(".proj-left img").forEach(img => {
    img.addEventListener("click", function() {
      const src = this.getAttribute("src");
      let found;
      for (const id of ids) {
        if (projectData[id].images.includes(src)) { found = projectData[id]; break; }
      }
      if (!found) return;
      const d = found;
      const imagesHTML = d.images.map(s => `<img src="${s}" alt="">`).join("");
      const tagsHTML = d.tags.map(t => `<span class="tag">${t}</span>`).join(" ");
      const dutiesHTML = d.duties.map((duty,i) => `<div><strong>${i+1}.</strong> ${duty}</div>`).join("");

      modal.open(`
        <h2>${d.title}</h2>
        <p class="desc">${d.desc}</p>
        <div class="modal-gallery">${imagesHTML}</div>
        <div style="margin:12px 0;">${tagsHTML}</div>
        <h3>⚙️ 项目职责</h3>
        <div class="modal-duties">${dutiesHTML}</div>
      `);
    });
  });
</script>
</body>
